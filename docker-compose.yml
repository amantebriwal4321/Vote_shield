version: '3.8'

services:
  # ─── PostgreSQL ─────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: voteshield-postgres
    environment:
      POSTGRES_DB: voteshield
      POSTGRES_USER: voteshield
      POSTGRES_PASSWORD: password
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./apps/api/src/db/init.sql:/docker-entrypoint-initdb.d/01-schema.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U voteshield"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── Redis ──────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: voteshield-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ─── API Server ─────────────────────────────────────
  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: voteshield-api
    ports:
      - "3000:3000"
    environment:
      DATABASE_URL: postgresql://voteshield:password@postgres:5432/voteshield
      REDIS_URL: redis://redis:6379
      PORT: 3000
      NODE_ENV: production
      DEMO_MODE: "true"
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_WHATSAPP_NUMBER: ${TWILIO_WHATSAPP_NUMBER:-whatsapp:+14155238886}
      TWILIO_SMS_NUMBER: ${TWILIO_SMS_NUMBER:-}
      TWILIO_VOICE_NUMBER: ${TWILIO_VOICE_NUMBER:-}
      HF_API_TOKEN: ${HF_API_TOKEN:-}
      JWT_SECRET: ${JWT_SECRET:-voteshield-demo-secret}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://127.0.0.1:3000/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ─── Dashboard ──────────────────────────────────────
  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: voteshield-dashboard
    ports:
      - "5173:80"
    depends_on:
      api:
        condition: service_healthy
    restart: unless-stopped

volumes:
  pgdata:
  redisdata:
